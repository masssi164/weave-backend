server:
  port: ${PORT:8080}

spring:
  application:
    name: weave-backend
  security:
    oauth2:
      resourceserver:
        jwt:
          # Required for a ready auth contract. Leave blank to start in blocked mode until
          # the backend can validate JWT iss, exp, nbf, and signature against the public issuer.
          # Canonical local/dev issuer: https://auth.weave.local/realms/weave
          issuer-uri: ${WEAVE_OIDC_ISSUER_URI:}
          # Optional. Use when the backend must fetch signing keys through an internal/private route
          # while preserving the public issuer URI in token validation.
          jwk-set-uri: ${WEAVE_OIDC_JWK_SET_URI:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

weave:
  platform:
    public-base-url: ${WEAVE_PUBLIC_BASE_URL:https://weave.local}
    api-base-url: ${WEAVE_API_BASE_URL:https://api.weave.local/api}
    auth-base-url: ${WEAVE_AUTH_BASE_URL:https://auth.weave.local}
    matrix-homeserver-url: ${WEAVE_MATRIX_HOMESERVER_URL:https://matrix.weave.local}
    files-product-url: ${WEAVE_FILES_PRODUCT_URL:https://weave.local/files}
    calendar-product-url: ${WEAVE_CALENDAR_PRODUCT_URL:https://weave.local/calendar}
    nextcloud-base-url: ${WEAVE_NEXTCLOUD_BASE_URL:https://files.weave.local}
    targets:
      mobile: ${WEAVE_TARGET_MOBILE:true}
      desktop: ${WEAVE_TARGET_DESKTOP:true}
      web: ${WEAVE_TARGET_WEB:false}
  security:
    # JWT aud must include the first-party Weave app audience.
    required-audience: ${WEAVE_OIDC_REQUIRED_AUDIENCE:weave-app}
    # JWT azp and/or client_id must identify the first-party Weave app client.
    client-id: ${WEAVE_CLIENT_ID:weave-app}
  nextcloud:
    files:
      base-url: ${WEAVE_NEXTCLOUD_BASE_URL:https://files.weave.local}
      webdav-root-path: ${WEAVE_NEXTCLOUD_FILES_WEBDAV_ROOT_PATH:/remote.php/dav/files}
      # MVP backend-owned actor seam. Leave username/token blank to fail closed with
      # nextcloud-adapter-not-configured instead of exposing caller credentials.
      actor-model: ${WEAVE_NEXTCLOUD_FILES_ACTOR_MODEL:backend-service-account}
      actor-username: ${WEAVE_NEXTCLOUD_FILES_ACTOR_USERNAME:}
      actor-token: ${WEAVE_NEXTCLOUD_FILES_ACTOR_TOKEN:${WEAVE_NEXTCLOUD_FILES_APP_PASSWORD:}}
  calendar:
    caldav:
      # Calendar product operations stay on /api; this backend actor is the only component
      # that talks to Nextcloud CalDAV. Leave credentials blank to fail safely with a
      # normalized nextcloud-adapter-not-configured error until the actor/token model is wired.
      base-url: ${WEAVE_CALDAV_BASE_URL:${WEAVE_NEXTCLOUD_BASE_URL:https://files.weave.local}}
      calendar-path-template: ${WEAVE_CALDAV_CALENDAR_PATH_TEMPLATE:/remote.php/dav/calendars/{user}/personal/}
      auth-mode: ${WEAVE_CALDAV_AUTH_MODE:BASIC}
      backend-username: ${WEAVE_CALDAV_BACKEND_USERNAME:}
      backend-token: ${WEAVE_CALDAV_BACKEND_TOKEN:}
      request-timeout-seconds: ${WEAVE_CALDAV_REQUEST_TIMEOUT_SECONDS:10}
  workspace:
    shell-access:
      enabled: ${WEAVE_WORKSPACE_SHELL_ACCESS_ENABLED:true}
    chat:
      enabled: ${WEAVE_WORKSPACE_CHAT_ENABLED:true}
      dependency-url: ${WEAVE_MATRIX_HOMESERVER_URL:https://matrix.weave.local}
      readiness: ${WEAVE_WORKSPACE_CHAT_READINESS:}
    files:
      enabled: ${WEAVE_WORKSPACE_FILES_ENABLED:true}
      dependency-url: ${WEAVE_NEXTCLOUD_BASE_URL:https://files.weave.local}
      readiness: ${WEAVE_WORKSPACE_FILES_READINESS:}
    calendar:
      enabled: ${WEAVE_WORKSPACE_CALENDAR_ENABLED:false}
      dependency-url: ${WEAVE_CALDAV_BASE_URL:${WEAVE_NEXTCLOUD_BASE_URL:https://files.weave.local}}
      readiness: ${WEAVE_WORKSPACE_CALENDAR_READINESS:}
    boards:
      enabled: ${WEAVE_WORKSPACE_BOARDS_ENABLED:false}
      readiness: ${WEAVE_WORKSPACE_BOARDS_READINESS:}
