name: Publish Backend Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  actions: read

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  live-stack-e2e:
    name: Verify Backend Commit In Live Stack
    if: github.ref == 'refs/heads/main'
    uses: masssi164/weave/.github/workflows/live-stack-e2e.yml@main
    with:
      weave_backend_repo: ${{ github.repository }}
      weave_backend_ref: ${{ github.sha }}

  publish:
    name: Build And Publish GHCR Image
    if: ${{ needs.live-stack-e2e.result == 'success' || needs.live-stack-e2e.result == 'skipped' }}
    runs-on: ubuntu-latest
    needs: live-stack-e2e
    outputs:
      image_ref: ghcr.io/${{ github.repository_owner }}/weave-backend:sha-${{ github.sha }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/weave-backend
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
